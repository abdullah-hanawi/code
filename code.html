
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>iegco</title>
    <style>
        /* تنسيق عام للجسم */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        /* حاوية المحتوى لجعل الموقع في المنتصف */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        /* تنسيق رسالة الترحيب */
        .welcome-msg {
            color: #27ae60;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            display: block; /* لضمان ظهورها كسطر مستقل */
        }
        /* تنسيق العناوين */
        h1 { color: #2c3e50; border-bottom: 2px solid #27ae60; display: inline-block; padding-bottom: 5px; }
        h2 { color: #e67e22; margin-top: 30px; transition: 0.3s; }
        h3 { color: #2980b9; }
        h4 { color: #7f8c8d; font-weight: normal; }
        h5 { color: #c0392b; font-size: 22px; font-weight: bold; text-decoration: underline; }
        /* إضافة تأثير عند مرور الماوس على العنوان */
        h2:hover {
            color: #d35400;
            transform: scale(1.05);
        }
        /* تنسيق إضافي للنصوص */
        .content-section {
            margin-top: 20px;
            text-align: right; /* لمحاذاة النصوص العربية */
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="welcome-msg">مرحبا بكم</span>
        
        <h1>مرحباً بك في موقعي!</h1>
        <p>هذا أول كود HTML أقوم بكتابته.</p>
        <div class="content-section">
            <h6>let me make my code</h6>
            <p>no i will not let you</p>
            
            <i>نص مائل</i><br>
            <u>نص تحته خط</u><br>
            <small>نص صغير </small><br>
            <strong>نص قوي عريض</strong><br>
            <em>نص مؤكد مائل</em><br>
            
            <h2>مركز صيانة مصاعد</h2>
            <h3>بتدور على شركة صيانة اسنسيرات فى الجيزه يبقى سيفتى فريست </h3>
            <h4>لو محتاج تركيب مصعد، لو محتاج صيانة اسنسيرات </h4>
            <h5>يبقى سيفتى فريست</h5>
        </div>
    </div>
</body>
</html>
